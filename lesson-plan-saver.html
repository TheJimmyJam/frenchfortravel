<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course File Saver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container { width: 100%; max-width: 820px; }

    header { margin-bottom: 28px; text-align: center; }
    header h1 { font-size: 26px; font-weight: 700; color: #f8fafc; letter-spacing: -0.5px; }
    header p { margin-top: 6px; font-size: 14px; color: #64748b; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 320px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #93c5fd;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #334155; }

    .detected-banner {
      margin-top: 16px;
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      min-height: 52px;
      transition: border-color 0.3s;
    }

    .detected-banner.found {
      border-color: #22c55e;
      background: #052e16;
    }

    .detected-banner.error {
      border-color: #ef4444;
      background: #1a0505;
    }

    .dup-warning {
      display: none;
      margin-top: 10px;
      border-radius: 8px;
      padding: 11px 16px;
      background: #1c1400;
      border: 1px solid #ca8a04;
      color: #fbbf24;
      font-size: 13px;
      font-weight: 600;
      align-items: center;
      gap: 10px;
    }
    .dup-warning.show { display: flex; }
    .dup-warning-icon { font-size: 16px; flex-shrink: 0; }
    .dup-warning-text { flex: 1; }
    .dup-warning-time { font-size: 11px; font-weight: 400; color: #92400e; white-space: nowrap; }

    .banner-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      white-space: nowrap;
    }

    .banner-filename {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 18px;
      font-weight: 700;
      color: #4ade80;
      flex: 1;
      text-align: center;
    }

    .banner-filename.error { color: #f87171; font-size: 13px; font-weight: 400; }

    .details {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .pill {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      font-size: 12px;
      padding: 4px 12px;
      color: #94a3b8;
    }

    .pill span { color: #818cf8; font-weight: 600; }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      padding: 13px 24px;
      transition: all 0.15s;
    }

    .btn-primary {
      background: #6366f1;
      color: #fff;
      flex: 1;
      font-size: 15px;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #1e293b; color: #334155; cursor: not-allowed; border: 1px solid #334155; }

    .btn-ghost {
      background: transparent;
      color: #64748b;
      border: 1px solid #334155;
      padding: 13px 18px;
    }
    .btn-ghost:hover { background: #1e293b; color: #e2e8f0; }

    .history-list { list-style: none; }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .history-item:hover { background: #0f172a; cursor: pointer; }
    .history-name { font-family: 'SF Mono', monospace; color: #818cf8; font-size: 13px; font-weight: 600; }
    .history-time { font-size: 11px; color: #475569; }

    .empty-state { text-align: center; color: #334155; font-size: 13px; padding: 16px 0; }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .badge {
      background: #1e3a5f;
      color: #60a5fa;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .btn-danger {
      background: transparent;
      color: #f87171;
      border: 1px solid #2d0a0a;
      font-size: 11px;
      padding: 5px 12px;
    }
    .btn-danger:hover { background: #1a0505; border-color: #f87171; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #22c55e;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.error { background: #ef4444; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .override-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    .override-row input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-family: 'SF Mono', monospace;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
    }
    .override-row input:focus { border-color: #6366f1; }
    .override-row label { margin-bottom: 0; white-space: nowrap; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>🌐 Course File Saver</h1>
    <p>Paste JS course content → auto-detects language pair → saves as <code style="color:#818cf8">course-xx-yy.txt</code></p>
  </header>

  <div class="card">
    <label>Paste Course JS Content</label>
    <textarea id="inputText" placeholder="// Dutch → French Native Lesson Plan&#10;var COURSE_NL_FR = [&#10;  ...&#10;]"></textarea>

    <!-- Detected file info -->
    <div class="detected-banner" id="detectedBanner">
      <span class="banner-label">Filename</span>
      <span class="banner-filename" id="filenameDisplay" style="color:#334155;">— paste content above —</span>
    </div>

    <!-- Duplicate warning -->
    <div class="dup-warning" id="dupWarning">
      <span class="dup-warning-icon">⚠️</span>
      <span class="dup-warning-text">Already saved — <span id="dupFilename"></span></span>
      <span class="dup-warning-time" id="dupTime"></span>
    </div>

    <div class="details" id="detailPills" style="display:none;">
      <div class="pill">Variable: <span id="pillVar">—</span></div>
      <div class="pill">Source: <span id="pillSrc">—</span></div>
      <div class="pill">Target: <span id="pillTgt">—</span></div>
    </div>

    <!-- Manual override -->
    <div class="override-row">
      <label>Override name:</label>
      <input type="text" id="overrideName" placeholder="e.g. course-nl-de" oninput="onOverride()" />
    </div>

    <div class="actions">
      <button class="btn-primary" id="saveBtn" onclick="saveFile()" disabled>⬇ Save as .txt</button>
      <button class="btn-ghost" onclick="resetAll()">↺ Reset</button>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="section-title">
      Saved Files
      <span class="badge" id="historyCount">0</span>
    </div>
    <ul class="history-list" id="historyList">
      <li class="empty-state">No saves yet</li>
    </ul>
    <div style="margin-top:10px;text-align:right;">
      <button class="btn-danger" onclick="clearHistory()">Clear History</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
  // Language code → full name map (common ones)
  const LANG = {
    af:'Afrikaans', ar:'Arabic', bg:'Bulgarian', bn:'Bengali', ca:'Catalan',
    cs:'Czech', cy:'Welsh', da:'Danish', de:'German', el:'Greek',
    en:'English', es:'Spanish', et:'Estonian', fa:'Persian', fi:'Finnish',
    fr:'French', ga:'Irish', gl:'Galician', gu:'Gujarati', he:'Hebrew',
    hi:'Hindi', hr:'Croatian', hu:'Hungarian', hy:'Armenian', id:'Indonesian',
    it:'Italian', ja:'Japanese', ka:'Georgian', kn:'Kannada', ko:'Korean',
    lt:'Lithuanian', lv:'Latvian', mk:'Macedonian', ml:'Malayalam', mr:'Marathi',
    ms:'Malay', mt:'Maltese', nl:'Dutch', no:'Norwegian', pa:'Punjabi',
    pl:'Polish', pt:'Portuguese', ro:'Romanian', ru:'Russian', sk:'Slovak',
    sl:'Slovenian', sq:'Albanian', sr:'Serbian', sv:'Swedish', sw:'Swahili',
    ta:'Tamil', te:'Telugu', th:'Thai', tl:'Filipino', tr:'Turkish',
    uk:'Ukrainian', ur:'Urdu', vi:'Vietnamese', zh:'Chinese', zu:'Zulu'
  };

  let detectedFilename = '';
  let currentContent = '';

  function isDuplicate(filename) {
    const h = loadHistory();
    return h.find(item => item.name === filename) || null;
  }

  function showDupWarning(filename, time) {
    const el = document.getElementById('dupWarning');
    document.getElementById('dupFilename').textContent = filename;
    document.getElementById('dupTime').textContent = 'Last saved: ' + time;
    el.classList.add('show');
  }

  function hideDupWarning() {
    document.getElementById('dupWarning').classList.remove('show');
  }

  function parseContent(text) {
    const firstLine = text.trim().split('\n')[0].trim();

    // 1. "COURSE FILE: course-en-nl.txt"
    const cfMatch = firstLine.match(/course\s*file\s*[:\-]?\s*course[-_]([a-z]{2,3})[-_]([a-z]{2,3})\.txt/i);
    if (cfMatch) {
      const src = cfMatch[1].toLowerCase(), tgt = cfMatch[2].toLowerCase();
      return { varName: `COURSE_${src.toUpperCase()}_${tgt.toUpperCase()}`, src, tgt, filename: `course-${src}-${tgt}.txt` };
    }

    // 2. First line is bare "course-en-nl" or "course-en-nl.txt"
    const firstLineMatch = firstLine.match(/^course[-_]([a-z]{2,3})[-_]([a-z]{2,3})(\.txt)?$/i);
    if (firstLineMatch) {
      const src = firstLineMatch[1].toLowerCase(), tgt = firstLineMatch[2].toLowerCase();
      return { varName: `COURSE_${src.toUpperCase()}_${tgt.toUpperCase()}`, src, tgt, filename: `course-${src}-${tgt}.txt` };
    }

    // 3. var/const/let COURSE_XX_YY = (case-insensitive)
    const varMatch = text.match(/(?:var|const|let)\s+(COURSE_([A-Za-z]{2,3})_([A-Za-z]{2,3})(?:_\w+)?)\s*=/i);
    if (varMatch) {
      const src = varMatch[2].toLowerCase(), tgt = varMatch[3].toLowerCase();
      return { varName: varMatch[1].toUpperCase(), src, tgt, filename: `course-${src}-${tgt}.txt` };
    }

    // 4. Bare COURSE_XX_YY anywhere (case-insensitive fallback)
    const bare = text.match(/\b(COURSE_([A-Za-z]{2,3})_([A-Za-z]{2,3})(?:_\w+)?)\b/i);
    if (bare) {
      const src = bare[2].toLowerCase(), tgt = bare[3].toLowerCase();
      return { varName: bare[1].toUpperCase(), src, tgt, filename: `course-${src}-${tgt}.txt` };
    }

    return null;
  }

  function onInput() {
    currentContent = document.getElementById('inputText').value;
    if (!currentContent.trim()) { resetUI(); return; }

    const override = document.getElementById('overrideName').value.trim();
    const result = parseContent(currentContent);

    const banner = document.getElementById('detectedBanner');
    const display = document.getElementById('filenameDisplay');
    const pills = document.getElementById('detailPills');
    const saveBtn = document.getElementById('saveBtn');

    if (override) {
      detectedFilename = override.endsWith('.txt') ? override : override + '.txt';
      banner.className = 'detected-banner found';
      display.className = 'banner-filename';
      display.textContent = detectedFilename;
      pills.style.display = 'none';
      saveBtn.disabled = false;
      const dupOverride = isDuplicate(detectedFilename);
      dupOverride ? showDupWarning(detectedFilename, dupOverride.time) : hideDupWarning();
      return;
    }

    if (result) {
      detectedFilename = result.filename;
      banner.className = 'detected-banner found';
      display.className = 'banner-filename';
      display.textContent = detectedFilename;

      document.getElementById('pillVar').textContent = result.varName;
      document.getElementById('pillSrc').textContent =
        (LANG[result.src] || result.src.toUpperCase()) + ' (' + result.src + ')';
      document.getElementById('pillTgt').textContent =
        (LANG[result.tgt] || result.tgt.toUpperCase()) + ' (' + result.tgt + ')';

      pills.style.display = 'flex';
      saveBtn.disabled = false;
      const dup = isDuplicate(detectedFilename);
      dup ? showDupWarning(detectedFilename, dup.time) : hideDupWarning();
    } else {
      detectedFilename = '';
      banner.className = 'detected-banner error';
      display.className = 'banner-filename error';
      display.textContent = 'Could not detect COURSE_XX_YY — use override below';
      pills.style.display = 'none';
      saveBtn.disabled = true;
      hideDupWarning();
    }
  }

  function onOverride() {
    onInput();
  }

  function resetUI() {
    detectedFilename = '';
    const banner = document.getElementById('detectedBanner');
    banner.className = 'detected-banner';
    document.getElementById('filenameDisplay').className = 'banner-filename';
    document.getElementById('filenameDisplay').style.color = '#334155';
    document.getElementById('filenameDisplay').textContent = '— paste content above —';
    document.getElementById('detailPills').style.display = 'none';
    document.getElementById('saveBtn').disabled = true;
    hideDupWarning();
  }

  function saveFile() {
    const content = document.getElementById('inputText').value;
    if (!content.trim() || !detectedFilename) return;

    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = detectedFilename;
    a.click();
    URL.revokeObjectURL(url);

    addHistory(detectedFilename);
    showToast('✓ Saved: ' + detectedFilename);
    resetAll();
  }

  function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('overrideName').value = '';
    currentContent = '';
    resetUI();
  }

  function resetAll() {
    clearAll();
    document.getElementById('inputText').focus();
  }

  // ─── History ─────────────────────────────────────────────
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem('cf_history') || '[]'); }
    catch(e) { return []; }
  }

  function addHistory(name) {
    const h = loadHistory();
    if (h.length && h[0].name === name) return;
    h.unshift({ name, time: new Date().toLocaleString() });
    if (h.length > 30) h.pop();
    localStorage.setItem('cf_history', JSON.stringify(h));
    renderHistory();
  }

  function renderHistory() {
    const h = loadHistory();
    document.getElementById('historyCount').textContent = h.length;
    const list = document.getElementById('historyList');
    if (!h.length) {
      list.innerHTML = '<li class="empty-state">No saves yet</li>';
      return;
    }
    list.innerHTML = h.map(item => `
      <li class="history-item">
        <span class="history-name">${item.name}</span>
        <span class="history-time">${item.time}</span>
      </li>`).join('');
  }

  function clearHistory() {
    localStorage.removeItem('cf_history');
    renderHistory();
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => { t.className = 'toast' + (isError ? ' error' : ''); }, 3000);
  }

  document.getElementById('inputText').addEventListener('input', onInput);
  renderHistory();
</script>
</body>
</html>
