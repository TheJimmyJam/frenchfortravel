<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cunning Linguist — Pair Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 24px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-block { text-align: center; }

    .stat-block .stat-num {
      font-size: 20px;
      font-weight: bold;
      display: block;
    }

    .stat-block .stat-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-done .stat-num { color: #27ae60; }
    .stat-lang .stat-num { color: #f39c12; }
    .stat-qa   .stat-num { color: #2980b9; }

    .table-wrap {
      overflow: auto;
      max-height: 85vh;
    }

    table {
      border-collapse: collapse;
      margin: 0 auto;
      min-width: 700px;
    }

    th, td {
      border: 1px solid #2c3e50;
      text-align: center;
      vertical-align: middle;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #2c3e50;
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      padding: 8px 6px;
      white-space: nowrap;
    }

    thead th:first-child {
      position: sticky;
      left: 0;
      top: 0;
      z-index: 3;
      font-size: 10px;
      width: 110px;
      min-width: 110px;
      color: #aaa;
      line-height: 1.4;
      background: #1e293b;
    }

    thead th.upcoming {
      background: #1e2d1e;
      color: #5d8a5d;
    }

    .row-header {
      position: sticky;
      left: 0;
      z-index: 1;
      background: #34495e;
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      padding: 6px 10px;
      white-space: nowrap;
      width: 110px;
      min-width: 110px;
    }

    .row-header.upcoming { background: #1e2d1e; color: #5d8a5d; }

    .diagonal {
      background: #3d3d3d;
      color: #555;
      font-size: 18px;
      width: 150px;
      min-width: 150px;
    }

    .pair-cell {
      background: #16213e;
      padding: 6px 7px;
      width: 150px;
      min-width: 150px;
    }

    .pair-cell.future {
      background: #0d1a0d;
      opacity: 0.6;
    }

    .pair-cell.all-clear {
      background: #1a2f1a;
      border-color: #27ae60 !important;
    }

    .pair-cell input[type="text"] {
      width: 100%;
      background: #0f3460;
      border: 1px solid #2c3e50;
      border-radius: 3px;
      color: #cce;
      font-size: 9px;
      padding: 3px 5px;
      outline: none;
      font-family: monospace;
      margin-bottom: 5px;
    }

    .pair-cell input[type="text"]::placeholder { color: #445; }

    .pair-cell.done input[type="text"],
    .pair-cell.all-clear input[type="text"] {
      border-color: #27ae60;
      background: #0d2e1a;
      color: #7dcea0;
    }

    .cb-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 3px;
      cursor: pointer;
      width: 100%;
    }

    .cb-row input[type="checkbox"] {
      width: 12px;
      height: 12px;
      cursor: pointer;
      flex-shrink: 0;
      margin: 0;
    }

    .cb-row input.cb-done { accent-color: #27ae60; }
    .cb-row input.cb-lang { accent-color: #f39c12; }
    .cb-row input.cb-qa   { accent-color: #2980b9; }

    .cb-text {
      font-size: 9px;
      color: #666;
      user-select: none;
      line-height: 1.2;
      text-align: left;
    }

    .cb-row.checked-done .cb-text { color: #27ae60; }
    .cb-row.checked-lang .cb-text { color: #f39c12; }
    .cb-row.checked-qa   .cb-text { color: #2980b9; }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 18px;
      font-size: 11px;
      color: #888;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .reset-btn {
      display: block;
      margin: 20px auto 0;
      padding: 7px 20px;
      background: transparent;
      border: 1px solid #555;
      color: #888;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }

    .reset-btn:hover { border-color: #e74c3c; color: #e74c3c; }
  </style>
</head>

    "Mandarin__Portuguese"          : "course-zh-pt.js",
    "Mandarin__Russian"             : "course-zh-ru.js",
    "Mandarin__Albanian"            : "course-zh-sq.js",
    "Mandarin__Turkish"             : "course-zh-tr.js",
  };

  // All languages treated equally — done/qa set based on whether a .js file exists
  const allLangNames = [
    "English","French","Spanish","Portuguese","Greek","Italian","German",
    "Japanese","Korean","Albanian","Dutch","Russian","Mandarin","Arabic","Hindi","Turkish",
    "Thai","Swahili","Vietnamese","Polish","Indonesian"
  ];

  allLangNames.forEach(n => allLangNames.forEach(t => {
    if (n === t) return;
    const key = `${n}__${t}`;
    const existing = JSON.parse(localStorage.getItem(key) || '{}');
    const file = LIVE_PAIRS[key] || '';
    localStorage.setItem(key, JSON.stringify({
      file,
      done: !!file,
      lang: existing.lang || false,
      qa: !!file
    }));
  }));

  const languages = [
    "English","French","Spanish","Portuguese","Greek","Italian","German",
    "Japanese","Korean","Albanian","Dutch","Russian","Mandarin","Arabic","Hindi","Turkish",
    "Thai","Swahili","Vietnamese","Polish","Indonesian"
  ];

  // Build header
  const headerRow = document.getElementById('header-row');
  languages.forEach(lang => {
    const th = document.createElement('th');
    th.textContent = lang;
    headerRow.appendChild(th);
  });

  // Build body
  const tbody = document.getElementById('matrix-body');
  languages.forEach(native => {
    const tr = document.createElement('tr');

    const rowHeader = document.createElement('td');
    rowHeader.className = 'row-header';
    rowHeader.textContent = native;
    tr.appendChild(rowHeader);

    languages.forEach(target => {
      const td = document.createElement('td');

      if (native === target) {
        td.className = 'diagonal';
        td.textContent = '—';
      } else {
        td.className = 'pair-cell';
        const key = `${native}__${target}`;
        const saved = JSON.parse(localStorage.getItem(key) || '{}');

        const fileInput = document.createElement('input');
        fileInput.type = 'text';
        fileInput.placeholder = 'lesson_plan.js';
        fileInput.spellcheck = false;
        if (saved.file) fileInput.value = saved.file;

        const doneRow = document.createElement('label');
        doneRow.className = 'cb-row';
        const cbDone = document.createElement('input');
        cbDone.type = 'checkbox'; cbDone.className = 'cb-done';
        const doneText = document.createElement('span');
        doneText.className = 'cb-text'; doneText.textContent = 'Lesson done';
        doneRow.appendChild(cbDone); doneRow.appendChild(doneText);
        if (saved.done || saved.file) { cbDone.checked = true; doneRow.classList.add('checked-done'); }

        const langRow = document.createElement('label');
        langRow.className = 'cb-row';
        const cbLang = document.createElement('input');
        cbLang.type = 'checkbox'; cbLang.className = 'cb-lang';
        const langText = document.createElement('span');
        langText.className = 'cb-text'; langText.textContent = 'Language reviewed';
        langRow.appendChild(cbLang); langRow.appendChild(langText);
        if (saved.lang) { cbLang.checked = true; langRow.classList.add('checked-lang'); }

        const qaRow = document.createElement('label');
        qaRow.className = 'cb-row';
        const cbQA = document.createElement('input');
        cbQA.type = 'checkbox'; cbQA.className = 'cb-qa';
        const qaText = document.createElement('span');
        qaText.className = 'cb-text'; qaText.textContent = 'QA / fields working';
        qaRow.appendChild(cbQA); qaRow.appendChild(qaText);
        if (saved.qa) { cbQA.checked = true; qaRow.classList.add('checked-qa'); }

        applyDoneState(td, cbDone.checked);
        applyAllClear(td, cbDone.checked, cbLang.checked, cbQA.checked);

        fileInput.addEventListener('input', () => {
          const hasFile = fileInput.value.trim().length > 0;
          cbDone.checked = hasFile;
          doneRow.classList.toggle('checked-done', hasFile);
          applyDoneState(td, hasFile);
          applyAllClear(td, cbDone.checked, cbLang.checked, cbQA.checked);
          persist(key, fileInput, cbDone, cbLang, cbQA);
          updateCounts();
        });

        cbDone.addEventListener('change', () => {
          doneRow.classList.toggle('checked-done', cbDone.checked);
          applyDoneState(td, cbDone.checked);
          applyAllClear(td, cbDone.checked, cbLang.checked, cbQA.checked);
          persist(key, fileInput, cbDone, cbLang, cbQA);
          updateCounts();
        });

        cbLang.addEventListener('change', () => {
          langRow.classList.toggle('checked-lang', cbLang.checked);
          applyAllClear(td, cbDone.checked, cbLang.checked, cbQA.checked);
          persist(key, fileInput, cbDone, cbLang, cbQA);
          updateCounts();
        });

        cbQA.addEventListener('change', () => {
          qaRow.classList.toggle('checked-qa', cbQA.checked);
          applyAllClear(td, cbDone.checked, cbLang.checked, cbQA.checked);
          persist(key, fileInput, cbDone, cbLang, cbQA);
          updateCounts();
        });

        td.appendChild(fileInput);
        td.appendChild(doneRow);
        td.appendChild(langRow);
        td.appendChild(qaRow);
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  function applyDoneState(td, done) { td.classList.toggle('done', done); }

  function applyAllClear(td, done, lang, qa) {
    td.classList.toggle('all-clear', done && lang && qa);
  }

  function persist(key, fileInput, cbDone, cbLang, cbQA) {
    localStorage.setItem(key, JSON.stringify({
      file: fileInput.value,
      done: cbDone.checked,
      lang: cbLang.checked,
      qa:   cbQA.checked
    }));
  }

  function updateCounts() {
    document.getElementById('done-count').textContent =
      document.querySelectorAll('.cb-done:checked').length;
    document.getElementById('lang-count').textContent =
      document.querySelectorAll('.cb-lang:checked').length;
    document.getElementById('qa-count').textContent =
      document.querySelectorAll('.cb-qa:checked').length;
  }

  function resetAll() {
    if (!confirm('Reset all pairs? This will clear everything.')) return;
    languages.forEach(n => languages.forEach(t => {
      if (n !== t) localStorage.removeItem(`${n}__${t}`);
    }));
    location.reload();
  }

  updateCounts();
</script>
</body>
</html>
